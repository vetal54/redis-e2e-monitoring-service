version: 2.1

orbs:
  gradle: circleci/gradle@3.0.0
  gcp-cli: circleci/gcp-cli@3.2.1

workflows:
  gitops_pipeline:
    jobs:
      - build_and_test:
          context: gcp-context

      - push_image_to_gar:
          context: gcp-context
          requires:
            - build_and_test
          filters:
            branches:
              only: main

jobs:
  build_and_test:
    docker:
      - image: cimg/openjdk:21.0
    steps:
      - checkout
      - setup_remote_docker
      - restore_cache:
          keys:
            - v1-gradle-{{ checksum "build.gradle" }}
            - v1-gradle-
      - run:
          name: Run Tests and Build Jar
          command: ./gradlew build
      - save_cache:
          paths:
            - ~/.gradle
          key: v1-gradle-{{ checksum "build.gradle" }}
      - persist_to_workspace:
          root: .
          paths:
            - build/libs
            - build.gradle

  push_image_to_gar:
    docker:
      - image: cimg/openjdk:21.0
    steps:
      - checkout
      - setup_remote_docker
      - attach_workspace:
          at: .

      - gcp-cli/install
      - gcp-cli/setup:
          gcp_cred_config: GCP_CRED_CONFIG_FILE
          service_account: "circleci-uploader@${GCP_PROJECT_ID}.iam.gserviceaccount.com"

      - run:
          name: Configure Docker for Google Artifact Registry
          command: |
            gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev --quiet
      - run:
          name: Build and Push Docker Image
          command: |
            GAR_IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/my-java-repo/java-app:${CIRCLE_SHA1}"
            
            echo "--- Building image via Spring Boot ---"
            ./gradlew bootBuildImage --imageName=$GAR_IMAGE
            
            echo "--- Push to Google Artifact Registry ---"
            docker push $GAR_IMAGE