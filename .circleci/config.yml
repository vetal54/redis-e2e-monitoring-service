version: 2.1

orbs:
  gradle: circleci/gradle@3.0.0

workflows:
  gitops_pipeline:
    jobs:
      - build_and_test:
          context: gcp-context

      - push_image_to_gar:
          context: gcp-context
          requires:
            - build_and_test
          filters:
            branches:
              only: main

jobs:
  build_and_test:
    docker:
      - image: cimg/openjdk:21.0
    steps:
      - checkout
      - setup_remote_docker
      - gradle/with_cache:
          cache_key: build-v1
          deps_checksum_file: build.gradle
          steps:
            - run:
                name: Run Tests and Build Jar
                command: |
                  # Прокидуємо хост для Testcontainers (захист від падіння Redis тесту)
                  export TESTCONTAINERS_HOST_OVERRIDE=$(echo $DOCKER_HOST | sed 's/tcp:\/\///' | cut -d: -f1)
                  ./gradlew build

      - persist_to_workspace:
          root: .
          paths:
            - build
            - build.gradle

  push_image_to_gar:
    docker:
      - image: cimg/openjdk:21.0
    steps:
      - checkout
      - setup_remote_docker
      - attach_workspace:
          at: .

      - run:
          name: Authenticate Google Cloud via OIDC
          command: |
            gcloud iam workload-identity-pools create-cred-config \
                "projects/${GCP_PROJECT_NUMBER}/locations/global/workloadIdentityPools/circleci-pool-v4/providers/circleci-provider" \
                --output-file=/tmp/gcp_cred_config.json \
                --service-account="circleci-uploader@${GCP_PROJECT_ID}.iam.gserviceaccount.com" \
                --grant-by-audience

            echo "export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp_cred_config.json" >> $BASH_ENV
            source $BASH_ENV

            gcloud auth login --cred-file=/tmp/gcp_cred_config.json --quiet
            gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev --quiet

      - run:
          name: Build and Push Docker Image
          command: |
            GAR_IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/my-java-repo/java-app:${CIRCLE_SHA1}"
            
            echo "--- Building image via Spring Boot ---"
            ./gradlew bootBuildImage --imageName=$GAR_IMAGE
            
            echo "--- Push to Google Artifact Registry ---"
            docker push $GAR_IMAGE