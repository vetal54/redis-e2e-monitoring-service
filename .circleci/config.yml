version: 2.1

orbs:
  gradle: circleci/gradle@3.0.0

workflows:
  gitops_pipeline:
    jobs:
      - build_and_test:
          context: gcp-context

      - push_image_to_gar:
          context: gcp-context
          requires:
            - build_and_test
          filters:
            branches:
              only: main

jobs:
  build_and_test:
    docker:
      - image: cimg/openjdk:21.0
    steps:
      - checkout
      - setup_remote_docker
      - restore_cache:
          keys:
            - v1-gradle-{{ checksum "build.gradle" }}
            - v1-gradle-
      - run:
          name: Run Tests and Build Jar
          command: ./gradlew build
      - save_cache:
          paths:
            - ~/.gradle
          key: v1-gradle-{{ checksum "build.gradle" }}
      - persist_to_workspace:
          root: .
          paths:
            - build/libs
            - build.gradle

  push_image_to_gar:
    docker:
      - image: cimg/openjdk:21.0
    steps:
      - checkout
      - setup_remote_docker
      - attach_workspace:
          at: .

      - run:
          name: Install gcloud CLI & Authenticate via OIDC
          command: |
            echo "--- Installing Google Cloud CLI (Automated) ---"
            curl -sSL https://sdk.cloud.google.com -o install.sh
            bash install.sh --disable-prompts > /dev/null
            
            export PATH=$PATH:$HOME/google-cloud-sdk/bin
            echo "export PATH=\$PATH:\$HOME/google-cloud-sdk/bin" >> $BASH_ENV
            
            echo "--- Preparing OIDC Token File ---"
            # Створюємо файл токена локально, він потрібен ТІЛЬКИ для gcloud на одну секунду
            echo "$CIRCLE_OIDC_TOKEN" > /tmp/gcp_oidc_token.txt

            echo "--- Generating OIDC Credential Config ---"
            gcloud iam workload-identity-pools create-cred-config \
                "projects/${GCP_PROJECT_NUMBER}/locations/global/workloadIdentityPools/circleci-pool-v4/providers/circleci-provider" \
                --output-file=/tmp/gcp_cred_config.json \
                --service-account="circleci-uploader@${GCP_PROJECT_ID}.iam.gserviceaccount.com" \
                --credential-source-file=/tmp/gcp_oidc_token.txt

            # Наша перевірена магія заміни авдиторії на UUID проєкту CircleCI
            sed -i 's|"//iam.googleapis.com/projects/[0-9]*/locations/global/workloadIdentityPools/circleci-pool-v4/providers/circleci-provider"|"2ab2cb71-f697-42bc-a8ea-7b4490572079"|g' /tmp/gcp_cred_config.json

            echo "export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp_cred_config.json" >> $BASH_ENV
            source $BASH_ENV

            echo "--- Logging into Google Cloud & Extracting Access Token ---"
            gcloud auth login --cred-file=/tmp/gcp_cred_config.json --quiet
            
            # ВИПРАВЛЕНО: Замість нестабільного docker-helper ми генеруємо чистий ТИМЧАСОВИЙ ТОКЕН ДОСТУПУ
            ACCESS_TOKEN=$(gcloud auth print-access-token)
            
            # Прямий логін в Docker Registry за допомогою отриманого токена.
            # Це передає авторизацію на віддалений Docker-хост миттєво і без файлів!
            echo "$ACCESS_TOKEN" | docker login -u oauth2access --password-stdin https://${GCP_REGION}-docker.pkg.dev
            

      - run:
          name: Build and Push Docker Image
          command: |
            GAR_IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/my-java-repo/java-app:${CIRCLE_SHA1}"
            
            echo "--- Building image via Spring Boot ---"
            ./gradlew bootBuildImage --imageName=$GAR_IMAGE
            
            echo "--- Push to Google Artifact Registry ---"
            docker push $GAR_IMAGE